name: Build and Test Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        run: docker build -t my-api:1.0.0 -f ./api/Dockerfile ./api

      - name: Docker Scout Scan API
        uses: docker/scout-action@v1
        with:
          command: cves, recommendation
          image: api-image:1.0.0
          file: ./api/Dockerfile
          only-severities: critical,high
          exit-code: false

      - name: Build Mongo image for scanning
        run: docker build -t mongo-image:1.0.0 -f ./Init/Dockerfile ./mongo

      - name: Docker Scout Scan Mongo
        uses: docker/scout-action@v1
        with:
          command: cves, recommendation
          image: mongo-image:1.0.0
          file: ./mongo/Dockerfile
          only-severities: critical,high
          exit-code: false

      - name: Build the stack
        run: docker compose up -d

      - name: Show containers
        run: docker compose ps

      - name: Push API image
        run: |
          docker tag api-image:1.0.0 ${{ secrets.DOCKER_USERNAME }}/mongo-api-mysql-api:1.0.0
          docker push ${{ secrets.DOCKER_USERNAME }}/mongo-api-mysql-api:1.0.0

      - name: Push Mongo image
        run: |
          docker tag mongo-image:1.0.0 ${{ secrets.DOCKER_USERNAME }}/mongo-api-mysql-mongo:1.0.0
          docker push ${{ secrets.DOCKER_USERNAME }}/mongo-api-mysql-mongo:1.0.0

      - name: Stop containers
        if: always()
        run: docker compose down -v
