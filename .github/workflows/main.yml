name: Build and Test Application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t api-image:1.0.0 -f ./api/Dockerfile ./api

      - name: Docker Scout Scan API
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://api-image:1.0.0
          file: ./api/Dockerfile
          only-severities: critical
          exit-code: true

      - name: Trivy Scan MySQL image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mysql:9.6
          severity: CRITICAL,HIGH
          exit-code: 0

  integration_tests:
    needs: security_scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build the stack
        run: docker compose up -d --build
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ynov_ci
          MYSQL_USER: admin
          MYSQL_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
          MONGO_DATABASE: blog_db
          ME_CONFIG_BASICAUTH_USERNAME: admin
          ME_CONFIG_BASICAUTH_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}

      - name: Check containers health
        run: ./scripts/check-health.sh

      - name: Test users route
        run: curl -f http://localhost:8000/users

      - name: Test posts route
        run: curl -f http://localhost:8000/posts

      - name: Stop containers
        if: always()
        run: docker compose down -v

  publish:
    needs: integration_tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build final API image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mongo-api-mysql-api:latest -f ./api/Dockerfile ./api

      - name: Push final API image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/mongo-api-mysql-api:latest
